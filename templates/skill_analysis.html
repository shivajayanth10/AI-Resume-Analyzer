<!DOCTYPE html>
<html>
<head>
    <title>Skill Analysis</title>

    <style>
        body{
            background:#1e232d;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        h1{
            margin-bottom:30px;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
        }

        .skill-box{
            background:#0d6efd;
            padding:20px;
            width:180px;
            text-align:center;
            border-radius:15px;
            font-size:20px;
            font-weight:bold;
            box-shadow:0 0 10px rgba(0,0,0,.3);
        }
    </style>
</head>
<body>

<h1>Skill Analysis</h1>

<div class="container">

{% for skill in skills %}
    <div class="skill-box">
        {{skill}}
    </div>
{% endfor %}

</div>
<hr style="margin-top:40px; margin-bottom:30px;">

<h2>🤖 AI Resume Analysis</h2>

<div style="
background:#2a2d3e;
padding:20px;
border-radius:15px;
white-space:pre-wrap;
line-height:1.8;
font-size:16px;
">
{{ ai_analysis }}
</div>
</body>
</html>
