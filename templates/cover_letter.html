<!DOCTYPE html>
<html>
<head>

    <title>AI Cover Letter Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;
            min-height:100vh;
            padding:50px;
        }

        .main-card{
            width:95%;
            max-width:1500px;
            margin:auto;
            background:#1e1e2f;
            border-radius:20px;
            padding:40px;
            box-shadow:0 8px 25px rgba(0,0,0,0.4);
        }

        .title{
            font-size:40px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            color:#9ca3af;
            margin-bottom:40px;
        }

        textarea{
            min-height:250px;
            resize:vertical;
        }

        .result-box{
    margin-top:20px;
    padding:25px;
    background:#08152f;
    border:1px solid #1e3a8a;
    border-radius:15px;
}
        .result-title{
    font-size:28px;
    font-weight:700;
    color:white;
    margin:0 0 15px 0;
}

pre{
    white-space:pre-wrap;
    word-wrap:break-word;
    overflow-x:hidden;
    overflow-y:auto;
    background:transparent;
    color:white;
    font-size:15px;
    line-height:1.8;
    font-family:'Segoe UI', sans-serif;
}    
        .btn-primary{
            padding:12px 30px;
            border-radius:12px;
        }

    </style>

</head>

<body>

<div class="main-card">

    <h1 class="title">
        📝 AI Cover Letter Generator
    </h1>

    <p class="subtitle">
        Upload your resume and job description to generate a personalized AI-powered cover letter.
    </p>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-4">

            <label class="form-label">
                Upload Resume (PDF)
            </label>

            <input
                class="form-control"
                type="file"
                name="resume"
                required>

        </div>


        <div class="mb-4">

            <label class="form-label">
                Paste Job Description
            </label>

            <textarea
                class="form-control"
                name="job_description"
                placeholder="Paste the job description here..."
                required></textarea>

        </div>


        <button
            class="btn btn-primary"
            type="submit">

            Generate Cover Letter

        </button>

    </form>


    {% if result %}

    <div class="result-box">

        <h3>
            📄 Generated Cover Letter
        </h3>

        <hr>

        <pre>{{ result }}</pre>

    </div>

    {% endif %}

</div>

</body>
</html>
