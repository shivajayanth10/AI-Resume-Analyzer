```html
<!DOCTYPE html>
<html>

<head>

<title>Edit Application</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card bg-secondary p-4">

<h2 class="text-center mb-4">
Edit Application
</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Company
</label>

<input
type="text"
name="company"
class="form-control"
value="{{ application[1] }}"
required>

</div>


<div class="mb-3">

<label class="form-label">
Role
</label>

<input
type="text"
name="role"
class="form-control"
value="{{ application[2] }}"
required>

</div>


<div class="mb-3">

<label class="form-label">
Status
</label>

<select
name="status"
class="form-select">

<option>Applied</option>

<option>Interview</option>

<option>Offer</option>

<option>Rejected</option>

</select>

</div>


<button
type="submit"
class="btn btn-primary">

Update Application

</button>

<a
href="/dashboard"
class="btn btn-success">

Back

</a>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
```
