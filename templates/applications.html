<!DOCTYPE html>
<html>

<head>

    <title>Add Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#1f2329;
            color:white;
        }

        .card{
            border:none;
            border-radius:20px;
            background:#111827;
        }

    </style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-5">

<h2 class="text-center mb-4">
📋 Add New Application
</h2>

<form method="POST" enctype="multipart/form-data">

<div class="mb-4">

<label class="form-label">
Company Name
</label>

<input
type="text"
name="company"
class="form-control"
placeholder="Google"
required>

</div>


<div class="mb-4">

<label class="form-label">
Role
</label>

<input
type="text"
name="role"
class="form-control"
placeholder="Software Engineer"
required>

</div>


<div class="mb-4">
<div class="mb-4">

<label class="form-label">
Upload Resume (PDF)
</label>

<input
type="file"
name="resume"
class="form-control"
accept=".pdf">

</div>
<label class="form-label">
Status
</label>

<select
name="status"
class="form-select">

<option>Applied</option>

<option>Interview</option>

<option>Rejected</option>

<option>Offer</option>

</select>

</div>
<div class="mb-4">

<label class="form-label">
Date Applied
</label>

<input
type="date"
name="date_applied"
class="form-control"
required>

</div>

<div class="d-grid">

<div class="d-grid">

<button type="submit" class="btn btn-primary btn-lg">
    Save Application
</button>

</div>

</div>

</form>

<br>

<div class="d-grid">

<a href="/dashboard"
class="btn btn-success">

Back To Dashboard

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
